<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>FlatCraft</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Meta refresh als fallback -->
  <meta http-equiv="refresh" content="0;url=https://flatcraft.github.io">
  <style>
    @font-face { font-family:'CMUSerif'; src:url('CMU serif.ttf') format('truetype'); font-display:swap; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:'CMUSerif',serif;background:#fff;color-scheme:light}
    .center{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;text-align:center}
    .btn{display:inline-block;padding:12px 18px;background:#111;color:#fff;text-decoration:none;border-radius:6px}
  </style>
</head>
<body>
  <div class="center">
    <div>
      <h1>FlatCraft</h1>
      <p>Je wordt doorgestuurd naar <strong>https://flatcraft.github.io</strong>. Als dat niet automatisch gebeurt, klik op de knop hieronder.</p>
      <p><a class="btn" href="https://flatcraft.github.io" target="_blank" rel="noopener noreferrer">Open FlatCraft</a></p>
    </div>
  </div>

  <script>
    // JavaScript redirect (sneller en betrouwbaarder)
    (function(){
      try {
        window.location.replace('https://flatcraft.github.io');
      } catch(e) {
        // fallback: do nothing, user can click the button
      }
    })();
  </script>
</body>
</html>
