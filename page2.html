<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Page 2</title>
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @font-face { font-family:'CMUSerif'; src:url('CMU serif.ttf') format('truetype'); font-display:swap; }
    @font-face { font-family:'Garamond'; src:url('Garamond Regular.ttf') format('truetype'); font-display:swap; }
    *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:'CMUSerif',serif;background:#fff;color-scheme:only light}
    .navbar{position:fixed;top:0;left:0;width:100%;height:60px;display:flex;align-items:center;padding:0 14px;z-index:1200;background:transparent;transition:background .25s,color .18s,backdrop-filter .25s;color:#fff}
    .navbar.scrolled{ background: rgba(255,255,255,0); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .navbar.light{ color:#fff } .navbar.dark{ color:#000 }
    .hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:inherit}
    .bars{width:22px;height:14px;position:relative}
    .bars span{position:absolute;left:0;right:0;height:2px;background:currentColor;border-radius:2px}
    .bars span:nth-child(1){top:0} .bars span:nth-child(2){top:6px} .bars span:nth-child(3){top:12px}
    .hamburger.open .bars span:nth-child(1){transform:translateY(6px) rotate(45deg)} .hamburger.open .bars span:nth-child(2){opacity:0} .hamburger.open .bars span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
    .side-menu{position:fixed;top:0;left:0;width:min(320px,85vw);height:100vh;background:#fff;transform:translateX(-110%);transition:transform .32s;z-index:1300;padding:80px 20px}
    .side-menu{position:fixed;top:0;left:0;width:min(300px,85vw);height:100vh;background:#fafaf8;transform:translateX(-110%);transition:transform .38s cubic-bezier(.4,0,.2,1);z-index:1300;overflow-y:auto;display:flex;flex-direction:column;border-right:1px solid #e8e4dc}
    .side-menu.open{transform:translateX(0);box-shadow:6px 0 40px rgba(0,0,0,0.13)}
    .side-menu-header{padding:32px 28px 24px;border-bottom:1px solid #e8e4dc}
    .side-menu-header .site-title{font-family:'Garamond','CMUSerif',serif;font-size:1.5rem;color:#111;letter-spacing:0.02em;margin:0}
    .side-menu-header .site-sub{font-family:'Garamond','CMUSerif',serif;font-size:0.78rem;color:#999;letter-spacing:0.12em;text-transform:uppercase;margin-top:3px}
    .side-menu nav{padding:20px 20px;flex:1;display:flex;flex-direction:column;gap:6px}
    .side-menu nav a{display:flex;align-items:center;gap:12px;padding:13px 16px;text-decoration:none;color:#222;font-family:'Garamond','CMUSerif',serif;font-size:1rem;border-radius:8px;border:1px solid transparent;transition:background .18s,border-color .18s,color .18s,transform .15s;letter-spacing:0.01em}
    .side-menu nav a:hover{background:#f0ece4;border-color:#ddd8cd;color:#000;transform:translateX(3px)}
    .side-menu nav a.active{background:#111;color:#fff;border-color:#111}
    .side-menu nav a.active:hover{background:#333;transform:translateX(3px)}
    .side-menu nav a .nav-icon{width:18px;height:18px;opacity:0.55;flex-shrink:0}
    .side-menu nav a.active .nav-icon{opacity:0.9}
    .side-menu nav a .nav-label{flex:1}
    .side-menu nav a .nav-arrow{margin-left:auto;opacity:0;transition:opacity .15s,transform .15s;font-size:0.9rem}
    .side-menu nav a:hover .nav-arrow{opacity:0.45;transform:translateX(2px)}
    .side-menu nav a.active .nav-arrow{opacity:0.7}
    .menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.28);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1250}
    .menu-overlay.open{opacity:1;pointer-events:auto} body.menu-open{overflow:hidden}
    .hero{position:relative;width:100%;height:50vh;overflow:hidden}
    .hero img{position:absolute;top:0;left:50%;transform:translate3d(-50%,0,0);width:100%;height:50vh;object-fit:cover;will-change:transform}
    .hero .overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;color:#fff;padding:0 20px}
    .hero .overlay h1{margin:0;font-size:6rem;text-shadow:0 6px 18px rgba(0,0,0,0.45)}
    @media(max-width:768px){.hero .overlay h1{font-size:3.3rem}.navbar{height:56px}}
    .content{padding:20px;padding-top:80px;min-height:100vh;background:#fff}
    .page-bottom-space { height: 40vh; }
  
    @media(prefers-color-scheme:dark){
      html,body{background:#fff!important;color:#000!important}
      .content{background:#fff!important;color:#000!important}
      .side-menu{background:#fafaf8!important;color:#222!important}
      .side-menu nav a{color:#222!important}
      .side-menu nav a.active{background:#111!important;color:#fff!important}
      .side-menu-header .site-title{color:#111!important}
      .side-menu-header .site-sub{color:#999!important}
    }
  </style>
</head>
<body>

  <header class="navbar" id="navbar">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="sideMenu">
      <span class="bars" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>
  </header>

  <div class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="side-menu-header">
      <div class="site-title">Flaty's</div>
      <div class="site-sub">Menu</div>
    </div>
    <nav>
      <a href="index.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span class="nav-label">Home</span>
        <span class="nav-arrow">›</span>
      </a>
      <a href="https://flatcraft.github.io" target="_blank" rel="noopener noreferrer">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nav-label">FlatCraft</span>
        <span class="nav-arrow">↗</span>
      </a>
      <a href="page2.html" class="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="nav-label">Page 2</span>
        <span class="nav-arrow">›</span>
      </a>
      <a href="page3.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="nav-label">Page 3</span>
        <span class="nav-arrow">›</span>
      </a>
    </nav>
  </div>

  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="hero" id="hero">
    <img src="panorama.jpg" id="heroImg" alt="Panorama">
    <div class="overlay"><h1>Page 2</h1></div>
  </div>

  <main class="content">
    <div class="page-bottom-space" aria-hidden="true"></div>
  </main>

  <script>
  (function(){
    const navbar=document.getElementById('navbar');
    const hamburger=document.getElementById('hamburger');
    const sideMenu=document.getElementById('sideMenu');
    const overlay=document.getElementById('menuOverlay');
    const hero=document.getElementById('hero');
    const heroImg=document.getElementById('heroImg');

    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    let ticking=false;
    function updateParallax(){
      if(!hero||!heroImg) return;
      if(isTouch){ heroImg.style.transform='translate3d(-50%,0,0) translateZ(0)'; ticking=false; return; }
      const rect=hero.getBoundingClientRect();
      const translateY=Math.round(rect.top * -0.5);
      heroImg.style.transform=`translate3d(-50%, ${translateY}px, 0)`;
      ticking=false;
    }
    function onScroll(){ if(!ticking){ requestAnimationFrame(updateParallax); ticking=true; } navbar.classList.toggle('scrolled', window.scrollY>10); updateNavbarOverHero(); }
    window.addEventListener('scroll', onScroll, {passive:true});
    window.addEventListener('touchmove', onScroll, {passive:true});
    updateParallax();

    function openMenu(){ sideMenu.classList.add('open'); overlay.classList.add('open'); hamburger.classList.add('open'); hamburger.setAttribute('aria-expanded','true'); document.body.classList.add('menu-open'); }
    function closeMenu(){ sideMenu.classList.remove('open'); overlay.classList.remove('open'); hamburger.classList.remove('open'); hamburger.setAttribute('aria-expanded','false'); document.body.classList.remove('menu-open'); }
    hamburger && hamburger.addEventListener('click', ()=> sideMenu.classList.contains('open') ? closeMenu() : openMenu());
    overlay && overlay.addEventListener('click', closeMenu);
    window.addEventListener('keydown', (e)=> { if(e.key==='Escape') closeMenu(); });

    function updateNavbarOverHero(){
      if (!navbar || !hero) return;
      const navH = navbar.getBoundingClientRect().height;
      const heroRect = hero.getBoundingClientRect();
      const overlapsHero = heroRect.bottom > 0 && heroRect.top < navH;
      if (overlapsHero) { navbar.classList.add('light'); navbar.classList.remove('dark'); } else { navbar.classList.add('dark'); navbar.classList.remove('light'); }
    }

    window.addEventListener('load', updateNavbarOverHero);
    window.addEventListener('resize', updateNavbarOverHero);
    if (heroImg) heroImg.addEventListener('load', ()=>{ updateParallax(); updateNavbarOverHero(); });
    updateNavbarOverHero();
    setTimeout(updateNavbarOverHero,300);
    setTimeout(updateNavbarOverHero,1200);
  })();
  </script>
</body>
</html>
