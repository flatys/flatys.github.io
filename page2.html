<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Page 2</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @font-face { font-family:'CMUSerif'; src:url('CMU serif.ttf') format('truetype'); font-display:swap; }
    @font-face { font-family:'GaramondRegular'; src:url('Garamond Regular.ttf') format('truetype'); font-display:swap; }
    *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:'CMUSerif',serif;background:#fff;color-scheme:light}
    .navbar{position:fixed;top:0;left:0;width:100%;height:60px;display:flex;align-items:center;padding:0 14px;z-index:1200;background:transparent;transition:background .25s,color .18s,backdrop-filter .25s;color:#fff}
    .navbar.scrolled{ background: rgba(255,255,255,0); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .navbar.light{ color:#fff } .navbar.dark{ color:#000 }
    .hamburger{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:inherit;padding:6px;border-radius:8px}
    .hamburger:focus{ outline:none; box-shadow:none; }
    .bars{ width:22px;height:14px;position:relative }
    .bars span{ position:absolute;left:0;right:0;height:2px;background:currentColor;border-radius:2px;transition:transform .25s,opacity .2s; }
    .bars span:nth-child(1){ top:0 } .bars span:nth-child(2){ top:6px } .bars span:nth-child(3){ top:12px }
    .hamburger.open .bars span:nth-child(1){ transform:translateY(6px) rotate(45deg) }
    .hamburger.open .bars span:nth-child(2){ opacity:0 }
    .hamburger.open .bars span:nth-child(3){ transform:translateY(-6px) rotate(-45deg) }

    .side-menu{position:fixed;top:0;left:0;width:min(360px,88vw);height:100vh;padding:84px 18px;z-index:1300;transform:translateX(-110%);transition:transform .32s ease,opacity .25s ease;display:flex;flex-direction:column;gap:8px;background: rgba(255,255,255,0.62);backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);box-shadow: 0 8px 30px rgba(0,0,0,0.08);overflow-y:auto; font-family:'GaramondRegular',serif}
    .side-menu.open{ transform:translateX(0); }
    .side-menu .menu-header{ display:flex;align-items:center;gap:12px;margin-bottom:6px }
    .side-menu .menu-title{ font-weight:700;font-size:1rem;color:#111 }

    .side-menu nav{ display:flex;flex-direction:column;gap:8px;width:100% }
    .side-menu nav a.menu-btn{ display:inline-flex;align-items:center;gap:10px;width:100%;padding:12px 14px;border-radius:10px;text-decoration:none;color:#111;background: rgba(255,255,255,0.04);border:1px solid rgba(0,0,0,0.04);font-size:1rem;font-weight:600;transition:background .16s ease,transform .12s ease,box-shadow .12s ease;min-height:48px;padding-left:16px;padding-right:16px; font-family:'GaramondRegular',serif }
    .side-menu nav a.menu-btn:hover,.side-menu nav a.menu-btn:focus{ background: rgba(255,255,255,0.12);border-color:rgba(0,0,0,0.08);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.06);outline:none }
    .menu-overlay{ position:fixed;inset:0;background:rgba(0,0,0,0.28);opacity:0;pointer-events:none;transition:opacity .25s;z-index:1250; }
    .menu-overlay.open{ opacity:1; pointer-events:auto; }

    .hero{position:relative;width:100%;height:50vh;overflow:hidden}
    .hero img{position:absolute;top:0;left:50%;transform:translate3d(-50%,0,0);width:100%;height:50vh;object-fit:cover;will-change:transform}
    .hero .overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;color:#fff;padding:0 20px}
    .hero .overlay h1{margin:0;font-size:6rem;text-shadow:0 6px 18px rgba(0,0,0,0.45)}
    @media(max-width:768px){.hero .overlay h1{font-size:3.3rem}.navbar{height:56px}}
    .content{padding:20px;padding-top:80px;min-height:100vh;background:#fff}
    .page-bottom-space{height:40vh}
  </style>
</head>
<body>

  <header class="navbar" id="navbar">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="sideMenu">
      <span class="bars" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>
  </header>

  <div class="side-menu" id="sideMenu" aria-hidden="true" role="dialog" aria-label="Menu">
    <div class="menu-header"><div class="menu-title">Menu</div></div>
    <nav>
      <a class="menu-btn" href="https://flatcraft.github.io" id="flatcraftBtn">FlatCraft</a>
      <a class="menu-btn" href="index.html">Home</a>
      <a class="menu-btn" href="page2.html">Page 2</a>
      <a class="menu-btn" href="page3.html">Page 3</a>
    </nav>
  </div>

  <div class="menu-overlay" id="menuOverlay" tabindex="-1" aria-hidden="true"></div>

  <div class="hero" id="hero">
    <img src="panorama.jpg" id="heroImg" alt="Panorama">
    <div class="overlay"><h1>Page 2</h1></div>
  </div>

  <main class="content">
    <div class="page-bottom-space" aria-hidden="true"></div>
  </main>

  <script>
  (function(){
    const navbar=document.getElementById('navbar');
    const hamburger=document.getElementById('hamburger');
    const sideMenu=document.getElementById('sideMenu');
    const overlay=document.getElementById('menuOverlay');
    const hero=document.getElementById('hero');
    const heroImg=document.getElementById('heroImg');

    let ticking=false;
    function updateParallax(){ if(!hero||!heroImg) return; const rect=hero.getBoundingClientRect(); const translateY=Math.round(rect.top * -0.5); heroImg.style.transform=`translate3d(-50%, ${translateY}px, 0)`; ticking=false; }
    function onScroll(){ if(!ticking){ requestAnimationFrame(updateParallax); ticking=true; } navbar.classList.toggle('scrolled', window.scrollY>10); updateNavbarOverHero(); }
    window.addEventListener('scroll', onScroll, {passive:true});
    window.addEventListener('touchmove', onScroll, {passive:true});
    updateParallax();

    let lastFocusedBeforeOpen = null;
    function openMenu(){ lastFocusedBeforeOpen = document.activeElement; sideMenu.classList.add('open'); overlay.classList.add('open'); sideMenu.setAttribute('aria-hidden','false'); hamburger.classList.add('open'); hamburger.setAttribute('aria-expanded','true'); document.body.classList.add('menu-open'); const first = sideMenu.querySelector('a.menu-btn'); if(first) first.focus(); }
    function closeMenu(){ sideMenu.classList.remove('open'); overlay.classList.remove('open'); sideMenu.setAttribute('aria-hidden','true'); hamburger.classList.remove('open'); hamburger.setAttribute('aria-expanded','false'); document.body.classList.remove('menu-open'); if(lastFocusedBeforeOpen && lastFocusedBeforeOpen !== hamburger){ try{ lastFocusedBeforeOpen.focus(); }catch(e){} } else { try{ hamburger.blur(); }catch(e){} } }
    if(hamburger) hamburger.addEventListener('click', ()=> sideMenu.classList.contains('open') ? closeMenu() : openMenu());
    if(overlay) overlay.addEventListener('click', closeMenu);
    window.addEventListener('keydown', (e)=> { if(e.key==='Escape') closeMenu(); });
    sideMenu.querySelectorAll('a.menu-btn').forEach(a=> a.addEventListener('click', ()=> closeMenu() ));

    function updateNavbarOverHero(){ if(!navbar||!hero) return; const navH=navbar.getBoundingClientRect().height; const heroRect=hero.getBoundingClientRect(); const overlapsHero = heroRect.bottom > 0 && heroRect.top < navH; if(overlapsHero){ navbar.classList.add('light'); navbar.classList.remove('dark'); } else { navbar.classList.add('dark'); navbar.classList.remove('light'); } }
    window.addEventListener('load', updateNavbarOverHero);
    window.addEventListener('resize', updateNavbarOverHero);
    if(heroImg) heroImg.addEventListener('load', ()=>{ updateParallax(); updateNavbarOverHero(); });
    updateNavbarOverHero();
    setTimeout(updateNavbarOverHero,300);
    setTimeout(updateNavbarOverHero,1200);
  })();
  </script>
</body>
</html>
