<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Flaty's</title>
  <style>
    @font-face {
      font-family: 'CMUSerif';
      src: url('CMU serif.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html,body { margin:0; height:100%; background:white; }

    .hero {
      position: relative;
      width: 100%;
      height: 50vh;
      overflow: hidden;
    }

    /* afbeelding is absoluut binnen hero (niet fixed) */
    .hero img {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, 0);
      width: 100%;
      height: 50vh;
      object-fit: cover;
      object-position: center;
      pointer-events: none;

      /* performance hints */
      will-change: transform;
      -webkit-transform: translate3d(-50%,0,0);
      transform: translate3d(-50%,0,0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .hero .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      z-index: 2;
      pointer-events: none;
      width: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .hero .overlay h1 {
      margin:0;
      color:#ffffff;
      font-family: 'CMUSerif', serif;
      font-size: 6rem; /* jouw gewenste grootte */
      line-height:1;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .content { height:200vh; background:white; position:relative; z-index:10; }

    @media (max-width:768px){
      .hero .overlay h1 { font-size:3.3rem; }
    }
  </style>
</head>
<body>

  <div class="hero" id="hero">
    <img src="panorama.jpg" id="heroImg" alt="">
    <div class="overlay"><h1>Flaty's</h1></div>
  </div>

  <div class="content"></div>

  <script>
    // rAF-throttled parallax, berekend relatief aan de hero container
    (function(){
      const img = document.getElementById('heroImg');
      const hero = document.getElementById('hero');
      let ticking = false;

      function update() {
        const rect = hero.getBoundingClientRect();
        // rect.top is positie van hero tov viewport; we willen beweging wanneer hero in beeld is
        // pas factor aan voor gewenste parallax-intensiteit (negatief = omhoog bij scroll)
        const factor = -0.5;
        const translateY = Math.round(rect.top * factor);
        // gebruik translate3d voor GPU-accel
        img.style.transform = `translate3d(-50%, ${translateY}px, 0)`;
        ticking = false;
      }

      function onScroll() {
        if (!ticking) {
          window.requestAnimationFrame(update);
          ticking = true;
        }
      }

      // passive listener voor betere touch-perf
      window.addEventListener('scroll', onScroll, { passive: true });

      // initial update (bij laden)
      update();
    })();
  </script>

</body>
</html>
