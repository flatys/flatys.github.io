<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Website</title>
    <style>
        body {
            margin: 0;
            background: white;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 50vh;
            overflow: hidden;
        }

        .hero img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            object-fit: cover;
            object-position: center;
            pointer-events: none;
            transform: translateY(0);
            transition: transform 0.05s linear;
        }

        .content {
            height: 200vh;
            background: white;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="panorama.jpg" id="heroImg">
    </div>

    <div class="content"></div>

    <script>
        const img = document.getElementById("heroImg");

        window.addEventListener("scroll", () => {
            const scrollY = window.scrollY;
            img.style.transform = `translateY(${scrollY * -0.5}px)`; 
        });
    </script>

</body>
</html>
