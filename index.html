<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Website</title>
    <style>
        body {
            margin: 0;
            background: white;
            font-family: Arial, sans-serif;
        }

        /* Panorama header */
        .header-image {
            width: 100%;
            background-image: url("panorama.jpg");
            background-size: cover;        /* zoomt mooi in */
            background-position: center;   /* houdt het midden in beeld */
            background-repeat: no-repeat;
            
            /* Standaard hoogte (voor laptops/tablets) */
            height: 300px;
        }

        /* Telefoons: vul ~50% van het scherm */
        @media (max-width: 600px) {
            .header-image {
                height: 50vh; /* halve schermhoogte */
            }
        }

        /* Grote schermen: niet te groot laten worden */
        @media (min-width: 1200px) {
            .header-image {
                height: 350px;
            }
        }
    </style>
</head>
<body>

    <div class="header-image"></div>

</body>
</html>
